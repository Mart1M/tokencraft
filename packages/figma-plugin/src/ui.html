<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TokenCraft</title>
    <style>
      :root {
        color-scheme: light;
        --background: #fcfcfd;
        --foreground: #29272e;
        --surface: #fff;
        --muted: #f4f3f6;
        --muted-foreground: #74717c;
        --border: #e6e4e9;
        --accent: #eeecff;
        --accent-foreground: #3e2b72;
        --primary: #5d2ee6;
        --primary-foreground: #fff;
        --danger: #c73835;
        --radius: 10px;
        --radius-md: 8px;
        --radius-sm: 6px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --background: #17161b;
          --foreground: #f1f0f5;
          --surface: #202026;
          --muted: #292832;
          --muted-foreground: #aaa8b3;
          --border: #383640;
          --accent: #302b4b;
          --accent-foreground: #f1ecff;
          --primary: #a78bfa;
          --primary-foreground: #20183b;
          --danger: #ff8f8a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font:
          12px/1.45 Inter,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      button,
      input {
        font: inherit;
      }
      button {
        border: 0;
        cursor: pointer;
      }
      button:focus-visible,
      input:focus-visible {
        outline: 0;
        box-shadow: 0 0 0 3px
          color-mix(in srgb, var(--primary) 45%, transparent);
      }
      #app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 64px;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .logo {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: var(--radius-md);
        background: var(--primary);
        color: #fff;
        flex: none;
      }
      .brand {
        min-width: 0;
      }
      .brand h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.015em;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        margin-left: auto;
        border-radius: 50%;
        background: var(--muted-foreground);
      }
      .status-dot.connected {
        background: #31a36a;
      }
      main {
        flex: 1;
        overflow: auto;
        padding: 16px;
      }
      .field {
        margin-bottom: 12px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted-foreground);
        font-size: 12px;
        font-weight: 500;
      }
      input {
        display: block;
        width: 100%;
        min-height: 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 7px 12px;
        background: var(--surface);
        color: var(--foreground);
      }
      input::placeholder {
        color: var(--muted-foreground);
        opacity: 0.9;
      }
      .hint {
        margin: 6px 0 0;
        color: var(--muted-foreground);
        font-size: 12px;
      }
      .section-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 24px 0 8px;
      }
      .section-title h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .collections {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .collection-card {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 48px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 8px 12px;
        background: var(--surface);
      }
      .collection-copy {
        min-width: 0;
        flex: 1;
      }
      .collection-title {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 8px;
      }
      .collection-title strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status-badge {
        flex: none;
        border-radius: 999px;
        padding: 2px 6px;
        background: var(--muted);
        color: var(--muted-foreground);
        font-size: 10px;
        font-weight: 600;
      }
      .status-badge.not-imported {
        background: var(--accent);
        color: var(--accent-foreground);
      }
      .status-badge.out-of-sync {
        background: #fff0c2;
        color: #775400;
      }
      .status-badge.up-to-date {
        background: #e2f5e9;
        color: #17663d;
      }
      @media (prefers-color-scheme: dark) {
        .status-badge.out-of-sync {
          background: #4a3912;
          color: #ffda70;
        }
        .status-badge.up-to-date {
          background: #163c28;
          color: #90e0b4;
        }
      }
      .connection-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: space-between;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 12px;
        background: var(--surface);
      }
      .connection-panel > div {
        display: grid;
        min-width: 0;
        gap: 3px;
      }
      .connection-panel strong {
        overflow: hidden;
        font-size: 12px;
        font-weight: 500;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .eyebrow {
        color: var(--muted-foreground);
        font-size: 11px;
        font-weight: 500;
      }
      .text-button {
        border: 0;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
      }
      .empty {
        border: 1px dashed var(--border);
        border-radius: var(--radius-md);
        padding: 24px 16px;
        color: var(--muted-foreground);
        text-align: center;
      }
      .summary {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--muted);
        padding: 12px;
        color: var(--muted-foreground);
      }
      .summary strong {
        color: var(--foreground);
      }
      .summary ul {
        margin: 7px 0 0;
        padding-left: 16px;
        max-height: 90px;
        overflow: auto;
        font-size: 11px;
      }
      footer {
        display: none;
        align-items: center;
        gap: 8px;
        min-height: 56px;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface);
      }
      footer.has-message {
        display: flex;
      }
      .button {
        height: 32px;
        border-radius: var(--radius-md);
        padding: 0 12px;
        font-size: 12px;
        font-weight: 500;
        transition:
          background 150ms ease,
          color 150ms ease;
      }
      .button-primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }
      .button-primary:hover {
        filter: brightness(0.95);
      }
      .button-secondary {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--foreground);
      }
      .button-secondary:hover {
        background: var(--muted);
      }
      .button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      #message {
        min-width: 0;
        flex: 1;
        overflow: hidden;
        color: var(--muted-foreground);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- TOKENSCRAFT_UI_SCRIPT -->
  </body>
</html>
